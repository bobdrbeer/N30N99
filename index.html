<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Benvenuto nel mondo di N30N99</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: monospace;
    }

    .testo {
        position: absolute;
        color: #00ffcc;
        font-size: 14px;
        text-shadow:
            0 0 5px #00ffcc,
            0 0 10px #00ffcc,
            0 0 20px #00ffcc,
            0 0 40px #00ffee;
        animation: float 4s infinite ease-in-out;
    }

    @keyframes float {
        0% { transform: translate(0,0); }
        50% { transform: translate(40px,-40px); }
        100% { transform: translate(0,0); }
    }

    .popup {
        position: absolute;
        width: 220px;
        height: 110px;
        background: black;
        color: #ff004c;
        border: 2px solid #ff004c;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-weight: bold;
        box-shadow:
            0 0 10px #ff004c,
            0 0 20px #ff004c,
            0 0 40px #ff004c;
        animation: move 3s linear infinite;
    }

    @keyframes move {
        0% { transform: translate(0,0); }
        25% { transform: translate(100px, 50px); }
        50% { transform: translate(-50px, 100px); }
        75% { transform: translate(-100px, -50px); }
        100% { transform: translate(0,0); }
    }
</style>
</head>
<body>

<script>
const testo = "Vaffanculo Coglione";

function creaTesto() {
    const t = document.createElement("div");
    t.className = "testo";
    t.innerText = testo;
    t.style.left = Math.random() * window.innerWidth + "px";
    t.style.top = Math.random() * window.innerHeight + "px";
    document.body.appendChild(t);
}

function creaPopup() {
    const p = document.createElement("div");
    p.className = "popup";
    p.innerText = testo;
    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.top = Math.random() * window.innerHeight + "px";
    document.body.appendChild(p);

    setTimeout(() => {
        p.remove();
    }, 4000);
}

// caos neon
setInterval(creaTesto, 80);
setInterval(creaPopup, 700);

setTimeout(() => {
    alert("Benvenuto nel mondo di N30N99");
}, 500);
</script>

</body>
</html>
